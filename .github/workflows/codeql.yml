name: CodeQL

# GitHub-native deep dataflow SAST for JS/TS (VCST-5292). Free for public repos;
# results appear in the repository Security tab. Runs the security-extended query
# suite. CodeQL needs no build step for interpreted JS/TS.

on:
  workflow_dispatch:
  push:
    branches: [master, dev]
    paths-ignore:
      - '.idea'
      - '.vscode'
      - 'README.md'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - '.idea'
      - '.vscode'
      - 'README.md'
      - 'LICENSE'
  schedule:
    - cron: '17 4 * * 1'

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    if: ${{ github.actor != 'dependabot[bot]' &&
         (github.event.pull_request.head.repo.full_name == github.repository ||
         github.event.pull_request.head.repo.full_name == '') }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: javascript-typescript
          queries: security-extended

      # Skip a finding: dismiss the alert in Security > Code scanning (False positive /
      # Won't fix), or add a top-level "paths-ignore:" above to exclude paths.
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          category: '/language:javascript-typescript'

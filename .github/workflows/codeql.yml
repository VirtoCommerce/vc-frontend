name: CodeQL

# GitHub-native deep dataflow SAST for JS/TS (VCST-5292). Free for public repos;
# results appear in the repository Security tab. Runs the security-extended query
# suite. CodeQL needs no build step for interpreted JS/TS.

on:
  workflow_dispatch:
  push:
    branches: [master, dev]
    paths-ignore:
      - '.idea'
      - '.vscode'
      - 'README.md'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - '.idea'
      - '.vscode'
      - 'README.md'
      - 'LICENSE'
  schedule:
    - cron: '17 4 * * 1'

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    if: ${{ github.actor != 'dependabot[bot]' &&
         (github.event.pull_request.head.repo.full_name == github.repository ||
         github.event.pull_request.head.repo.full_name == '') }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          category: '/language:javascript-typescript'

#import "../../../common/fragments/money.graphql"

query GetOrganizationOrders(
  $filter: String
  $sort: String
  $cultureName: String
  $after: String
  $first: Int
  $facet: String
  $organizationId: String
) {
  organizationOrders(
    filter: $filter
    sort: $sort
    cultureName: $cultureName
    after: $after
    first: $first
    facet: $facet
    organizationId: $organizationId
  ) {
    totalCount
    items {
      id
      createdDate
      status
      statusDisplayValue
      currency {
        code
      }
      total {
        ...money
      }
      orderTotals {
        isDefaultTotalCurrency
        total {
          ...money
        }
        subTotal {
          ...money
        }
        discountTotal {
          ...money
        }
        taxTotal {
          ...money
        }
      }
      inPayments(first: 1, sort: "CreatedDate:desc") {
        number
        paymentMethod {
          code
          name
        }
      }
      number
      customerId
      customerName
      purchaseOrderNumber
    }
    term_facets {
      name
      terms {
        term
        label
        count
      }
    }
  }
}

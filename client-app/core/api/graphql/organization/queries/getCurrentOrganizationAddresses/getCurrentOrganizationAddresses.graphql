#import "../../../fragments/memberAddressFields.graphql"

query GetCurrentOrganizationAddresses(
  $after: String
  $first: Int
  $sort: String
  $countryCodes: [String]
  $regionIds: [String]
  $cities: [String]
  $keyword: String
) {
  currentOrganizationAddresses(
    after: $after
    first: $first
    sort: $sort
    countryCodes: $countryCodes
    regionIds: $regionIds
    cities: $cities
    keyword: $keyword
  ) {
    totalCount
    items {
      ...memberAddressFields
    }
    term_facets {
      name
      terms {
        term
        label
        count
      }
    }
  }
}
